[pytest]
# ── 路径 ──────────────────────────────────────────
testpaths = tests

# ── 运行选项 ──────────────────────────────────────
addopts =
    -v
    -s
    --strict-markers
    --tb=short
    --reruns 1
    --reruns-delay 2
    --alluredir=reports/allure-results
    --clean-alluredir

# ── 标记 (markers) ────────────────────────────────
markers =
    smoke: 冒烟测试 (push 时跑，30s 内)
    regression: 回归测试 (PR merge 时跑全量)

# ── 日志 ──────────────────────────────────────────
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s | %(levelname)-7s | %(message)s
log_cli_date_format = %H:%M:%S

# ── 重试 ──────────────────────────────────────────
